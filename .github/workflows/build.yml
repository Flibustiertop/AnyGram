name: Build AnyGram IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 350

    steps:
      # ── 1. Checkout our config/patch files ────────────────────────────────
      - name: Checkout AnyGram patches
        uses: actions/checkout@v4
        with:
          path: anygram-config

      # ── 2. Free disk space (~15 GB freed) ────────────────────────────────
      - name: Free disk space
        run: |
          echo "=== Disk BEFORE ==="
          df -h /
          # Remove simulator runtimes (~10 GB)
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches || true
          # Remove unused large packages
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/share/powershell || true
          brew cleanup --prune=all 2>/dev/null || true
          echo "=== Disk AFTER ==="
          df -h /

      # ── 3. Select the Xcode version Swiftgram requires ───────────────────
      - name: Select Xcode version
        run: |
          REQUIRED=$(curl -s https://raw.githubusercontent.com/Swiftgram/Telegram-iOS/master/versions.json \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["xcode"])' 2>/dev/null || echo "")
          echo "Swiftgram requires Xcode: $REQUIRED"
          if [ -n "$REQUIRED" ] && ls /Applications/ | grep -q "Xcode_${REQUIRED}"; then
            sudo xcode-select -s "/Applications/Xcode_${REQUIRED}.app/Contents/Developer"
          else
            # Use latest available
            LATEST=$(ls /Applications | grep '^Xcode' | sort -V | tail -1)
            echo "Using: $LATEST"
            sudo xcode-select -s "/Applications/${LATEST}/Contents/Developer"
          fi
          echo "Active Xcode: $(xcodebuild -version | head -1)"

      # ── 4. Clone Swiftgram (shallow + shallow submodules) ────────────────
      - name: Clone Swiftgram
        run: |
          echo "=== Starting clone ==="
          git clone \
            --depth=1 \
            --recurse-submodules \
            --shallow-submodules \
            -j8 \
            https://github.com/Swiftgram/Telegram-iOS.git \
            /Users/Shared/telegram-ios
          echo "=== Clone done ==="
          du -sh /Users/Shared/telegram-ios || true
          df -h /

      # ── 5. Apply AnyGram branding ─────────────────────────────────────────
      #    IMPORTANT: bundle_id stays "ph.telegra.Telegraph" to match
      #    fake-codesigning profiles. Only API keys + display name change.
      - name: Apply branding
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          python3 anygram-config/patches/apply_branding.py \
            /Users/Shared/telegram-ios \
            "${TELEGRAM_API_ID:-34053256}" \
            "${TELEGRAM_API_HASH:-bc8984a70877b5768e5a6a80222da985}"

      # ── 6. Inject default MTProto proxy ──────────────────────────────────
      - name: Inject MTProto proxy
        run: |
          python3 anygram-config/patches/apply_proxy.py /Users/Shared/telegram-ios

      # ── 7. Replace app icon ───────────────────────────────────────────────
      - name: Replace app icon
        run: |
          chmod +x anygram-config/patches/apply_icon.sh
          bash anygram-config/patches/apply_icon.sh \
            /Users/Shared/telegram-ios \
            "$(pwd)/anygram-config/assets/AppIcon.png"

      # ── 8. Import fake codesigning certificates ───────────────────────────
      - name: Import fake certs
        run: |
          cd /Users/Shared/telegram-ios
          python3 build-system/Make/ImportCertificates.py \
            --path build-system/fake-codesigning/certs

      # ── 9. Calculate build number ─────────────────────────────────────────
      - name: Get build number
        id: meta
        run: |
          cd /Users/Shared/telegram-ios
          OFFSET=$(cat build_number_offset 2>/dev/null || echo 0)
          COUNT=$(git rev-list --count HEAD)
          BUILD=$((COUNT + OFFSET))
          VER=$(python3 -c 'import json; print(json.load(open("versions.json"))["app"])' 2>/dev/null || echo "1.0")
          echo "BUILD_NUMBER=$BUILD"   >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VER"      >> $GITHUB_OUTPUT
          echo "Build: v$VER ($BUILD)"

      # ── 10. Build IPA with Bazel + fake-codesigning ────────────────────
      # --disableExtensions is REQUIRED for sideloading with a free Apple ID.
      # Without it, the app uses App Groups (group.ph.telegra.Telegraph) which
      # belongs to Telegram's team and cannot be provisioned by a personal Apple ID,
      # causing an instant crash (black screen) on launch.
      - name: Build AnyGram
        run: |
          cd /Users/Shared/telegram-ios
          BAZEL_ROOT="/private/var/tmp/_bazel_anygram"

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="${{ steps.meta.outputs.BUILD_NUMBER }}" \
            --disableExtensions

      # ── 11. Collect & verify IPA ──────────────────────────────────────────
      - name: Collect IPA
        run: |
          mkdir -p /tmp/anygram-artifacts
          SOURCE=/Users/Shared/telegram-ios

          echo "=== Searching for IPA files ==="
          # Search in all possible Bazel output locations (symlinks + real paths)
          IPA_PATH=""

          # Method 1: relative from source dir (follows bazel-out symlink)
          cd "$SOURCE"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            [ -f "$f" ] && IPA_PATH="$SOURCE/$f" && echo "Found (method 1): $f" && break
          done

          # Method 2: search in bazel user root real path
          if [ -z "$IPA_PATH" ]; then
            FOUND=$(find /private/var/tmp/_bazel_anygram -name "Telegram.ipa" 2>/dev/null | head -1)
            [ -n "$FOUND" ] && IPA_PATH="$FOUND" && echo "Found (method 2): $FOUND"
          fi

          # Method 3: find anywhere under /private/var/tmp
          if [ -z "$IPA_PATH" ]; then
            FOUND=$(find /private/var/tmp -name "*.ipa" 2>/dev/null | head -1)
            [ -n "$FOUND" ] && IPA_PATH="$FOUND" && echo "Found (method 3): $FOUND"
          fi

          # Method 4: resolve bazel-out symlink and search
          if [ -z "$IPA_PATH" ]; then
            REAL_BAZEL=$(readlink -f "$SOURCE/bazel-out" 2>/dev/null || true)
            [ -n "$REAL_BAZEL" ] && FOUND=$(find "$REAL_BAZEL" -name "*.ipa" 2>/dev/null | head -1)
            [ -n "$FOUND" ] && IPA_PATH="$FOUND" && echo "Found (method 4): $FOUND"
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: IPA not found anywhere!"
            echo "=== All IPA files on system ==="
            find / -name "*.ipa" -not -path "*/proc/*" 2>/dev/null | head -20 || true
            exit 1
          fi

          cp "$IPA_PATH" /tmp/anygram-artifacts/AnyGram.ipa
          ls -lh /tmp/anygram-artifacts/AnyGram.ipa
          echo "IPA collected successfully"

      # ── 12. Strip extensions & App Groups from IPA ───────────────────────
      # Extra safety: remove any .appex bundles and the App Groups entitlement
      # from the IPA so Sideloadly's re-signing never encounters them.
      - name: Strip extensions from IPA
        run: |
          cd /tmp/anygram-artifacts
          mkdir -p strip_work

          # Unzip IPA
          unzip -q AnyGram.ipa -d strip_work/

          APP_DIR=$(ls strip_work/Payload/)
          APP_PATH="strip_work/Payload/$APP_DIR"
          echo "App path: $APP_PATH"

          # Remove all app extensions (.appex)
          if [ -d "$APP_PATH/PlugIns" ]; then
            echo "Extensions found:"
            ls "$APP_PATH/PlugIns/" || true
            rm -rf "$APP_PATH/PlugIns"
            echo "[OK] Removed PlugIns directory"
          else
            echo "[OK] No PlugIns directory"
          fi

          # Remove WatchKit app if present
          if [ -d "$APP_PATH/Watch" ]; then
            rm -rf "$APP_PATH/Watch"
            echo "[OK] Removed Watch directory"
          fi

          # Strip App Groups from embedded entitlements using Python
          python3 - "$APP_PATH" <<'PYEOF'
          import os, plistlib, subprocess, sys

          app_path = sys.argv[1]
          binary_name = os.path.splitext(os.path.basename(app_path))[0]
          binary_path = os.path.join(app_path, binary_name)

          if not os.path.exists(binary_path):
              print(f"[WARN] Binary not found: {binary_path}")
              sys.exit(0)

          # Extract embedded entitlements from binary
          result = subprocess.run(
              ["codesign", "-d", "--entitlements", "-", "--xml", binary_path],
              capture_output=True
          )
          if result.returncode != 0:
              print(f"[INFO] codesign extract returned {result.returncode}, skipping entitlement patch")
              sys.exit(0)

          try:
              ents = plistlib.loads(result.stdout)
          except Exception as e:
              print(f"[INFO] Could not parse entitlements: {e}")
              sys.exit(0)

          changed = False
          for key in [
              "com.apple.security.application-groups",
              "com.apple.developer.icloud-container-identifiers",
              "com.apple.developer.icloud-services",
              "com.apple.developer.ubiquity-container-identifiers",
              "com.apple.developer.ubiquity-kvstore-identifier",
              "com.apple.developer.siri",
          ]:
              if key in ents:
                  del ents[key]
                  changed = True
                  print(f"[OK] Removed entitlement: {key}")

          if changed:
              ents_file = "/tmp/stripped.entitlements"
              with open(ents_file, "wb") as f:
                  plistlib.dump(ents, f, fmt=plistlib.FMT_XML)
              # Re-sign binary with stripped entitlements using fake cert
              r = subprocess.run(
                  ["codesign", "--force", "--sign", "-", "--entitlements", ents_file, binary_path],
                  capture_output=True
              )
              print(f"[INFO] Re-sign result: {r.returncode}")
              if r.stderr:
                  print(r.stderr.decode())
          else:
              print("[OK] No problematic entitlements found in binary")
          PYEOF

          # Repack IPA
          rm AnyGram.ipa
          cd strip_work
          zip -qr ../AnyGram.ipa Payload/
          cd ..
          rm -rf strip_work
          ls -lh AnyGram.ipa
          echo "[OK] IPA repacked without extensions"

      # ── 13. Upload IPA artifact ───────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-IPA
          path: /tmp/anygram-artifacts/AnyGram.ipa
          retention-days: 30
          if-no-files-found: error
