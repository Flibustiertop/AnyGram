name: Build AnyGram IPA

# Manually triggered only
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13          # Swiftgram uses macos-13 in its own CI
    timeout-minutes: 350       # Bazel build can take 1-3 hours

    steps:
      # ── 1. Checkout our patch files ───────────────────────────────────────
      - name: Checkout AnyGram patches
        uses: actions/checkout@v4
        with:
          path: anygram-patches

      # ── 2. Free disk space ────────────────────────────────────────────────
      - name: Free disk space
        run: |
          echo "=== Disk before ===" && df -h /
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches 2>/dev/null || true
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /Applications/Xcode_14.3.1.app 2>/dev/null || true
          sudo rm -rf /Applications/Xcode_14.2.app 2>/dev/null || true
          echo "=== Disk after ===" && df -h /

      # ── 3. Fetch required Xcode version from Swiftgram ────────────────────
      - name: Determine required Xcode version
        id: xcode
        run: |
          VER=$(curl -sf https://raw.githubusercontent.com/Swiftgram/Telegram-iOS/master/versions.json \
                | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"])' 2>/dev/null \
                || echo "")
          echo "Required Xcode: '$VER'"
          if [ -n "$VER" ] && [ -d "/Applications/Xcode_${VER}.app" ]; then
            echo "xcode_path=/Applications/Xcode_${VER}.app" >> $GITHUB_OUTPUT
          else
            AVAILABLE=$(ls /Applications/ | grep -E '^Xcode' | sort -V | tail -1)
            echo "Using available: $AVAILABLE"
            echo "xcode_path=/Applications/${AVAILABLE}" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: |
          sudo xcode-select -s "${{ steps.xcode.outputs.xcode_path }}/Contents/Developer"
          xcodebuild -version
          swift --version

      # ── 4. Clone Swiftgram (shallow with shallow submodules) ──────────────
      - name: Clone Swiftgram
        run: |
          echo "=== Cloning Swiftgram ===" && df -h /
          git clone \
            --depth=1 \
            --recurse-submodules \
            --shallow-submodules \
            -j8 \
            https://github.com/Swiftgram/Telegram-iOS.git \
            /Users/Shared/telegram-ios
          echo "=== Clone done ===" && df -h /

      # ── 5. Apply branding (name + API keys only, keep bundle_id for certs) ─
      - name: Apply AnyGram branding
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          python3 anygram-patches/patches/apply_branding.py \
            /Users/Shared/telegram-ios \
            "${TELEGRAM_API_ID:-34053256}" \
            "${TELEGRAM_API_HASH:-bc8984a70877b5768e5a6a80222da985}"

      # ── 6. Inject default MTProto proxy ──────────────────────────────────
      - name: Inject default proxy
        run: |
          python3 anygram-patches/patches/apply_proxy.py /Users/Shared/telegram-ios

      # ── 7. Replace app icon ──────────────────────────────────────────────
      - name: Replace app icon
        run: |
          chmod +x anygram-patches/patches/apply_icon.sh
          bash anygram-patches/patches/apply_icon.sh \
            /Users/Shared/telegram-ios \
            anygram-patches/assets/AppIcon.png

      # ── 8. Import fake codesigning certificates ──────────────────────────
      - name: Import fake certificates
        run: |
          cd /Users/Shared/telegram-ios
          python3 build-system/Make/ImportCertificates.py \
            --path build-system/fake-codesigning/certs

      # ── 9. Build number ──────────────────────────────────────────────────
      - name: Calculate build number
        id: buildnum
        run: |
          cd /Users/Shared/telegram-ios
          OFFSET=$(cat build_number_offset 2>/dev/null || echo 0)
          COUNT=$(git rev-list --count HEAD 2>/dev/null || echo 1)
          BUILDNUM=$((COUNT + OFFSET))
          APPVER=$(python3 -c 'import json; v=json.load(open("versions.json")); print(v["app"])' 2>/dev/null || echo "1.0")
          echo "BUILD_NUMBER=$BUILDNUM"  >> $GITHUB_OUTPUT
          echo "APP_VERSION=$APPVER"     >> $GITHUB_OUTPUT
          echo "Build: $APPVER ($BUILDNUM)"

      # ── 10. Bazel build ───────────────────────────────────────────────────
      - name: Build with Bazel
        run: |
          cd /Users/Shared/telegram-ios

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="/private/var/tmp/_bazel_anygram" \
            build \
            --configurationPath="build-system/anygram-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="${{ steps.buildnum.outputs.BUILD_NUMBER }}"

      # ── 11. Collect and rename IPA ────────────────────────────────────────
      - name: Collect IPA
        run: |
          ARTIFACTS=/Users/Shared/telegram-ios/build/artifacts
          mkdir -p "$ARTIFACTS"
          IPA=$(find /Users/Shared/telegram-ios/bazel-out -name "Telegram.ipa" 2>/dev/null | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" "$ARTIFACTS/AnyGram.ipa"
            echo "[OK] IPA collected: $IPA"
            ls -lh "$ARTIFACTS/"
          else
            echo "[ERROR] No IPA found in bazel-out!"
            find /Users/Shared/telegram-ios/bazel-out -name "*.ipa" 2>/dev/null || true
            exit 1
          fi

      # ── 12. Upload IPA as artifact ────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AnyGram-IPA
          path: /Users/Shared/telegram-ios/build/artifacts/AnyGram.ipa
          retention-days: 14
          if-no-files-found: error
